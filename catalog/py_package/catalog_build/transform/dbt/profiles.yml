catalog_build:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Path to the DuckDB file that dlt will have populated and that dbt should read/write.
      # The orchestration layer should set CATALOG_BUILD_DUCKDB_PATH.
      path: "{{ env_var('CATALOG_BUILD_DUCKDB_PATH') }}"
      threads: 4
