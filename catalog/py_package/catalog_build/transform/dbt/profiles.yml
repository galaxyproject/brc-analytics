catalog_taxonomy:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Path to the DuckDB file the dlt pipeline writes. The orchestration layer
      # should set TAXONOMY_DUCKDB_PATH; the default keeps the project runnable
      # on its own from this directory.
      path: "{{ env_var('TAXONOMY_DUCKDB_PATH', 'taxonomy.duckdb') }}"
      threads: 4
