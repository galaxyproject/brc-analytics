version: 2

sources:
  - name: ncbi
    description: >
      Raw NCBI taxdump tables loaded by the dlt pipeline. The schema matches the
      dlt pipeline's dataset_name.
    schema: ncbi
    tables:
      - name: taxonomy_nodes
        description: "nodes.dmp — one row per taxon."
        columns:
          - name: tax_id
            data_tests:
              - not_null
          - name: parent_tax_id
            data_tests:
              - not_null
          - name: rank
            data_tests:
              - not_null
      - name: taxonomy_names
        description: "names.dmp - one row per name."
        columns:
          - name: tax_id
            data_tests:
              - not_null
          - name: name_txt
            data_tests:
              - not_null
          - name: name_class
            data_tests:
              - not_null

  - name: catalog_source
    description: >
      Catalog inputs written into DuckDB by build.py before the dbt run.
    schema: catalog_source
    tables:
      - name: assembly_taxa
        columns:
          - name: taxonomy_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: ref('taxonomy_assemblies')
                    field: taxonomy_id
      - name: organism_taxa
        columns:
          - name: taxonomy_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: ref('taxonomy_organisms')
                    field: taxonomy_id
      - name: outbreak_taxa
        # Only tested when the catalog has outbreaks
        columns:
          - name: taxonomy_id
            data_tests:
              - not_null:
                  config:
                    enabled: "{{ var('has_outbreaks', false) }}"
              - relationships:
                  arguments:
                    to: ref('taxonomy_outbreaks')
                    field: taxonomy_id
                  config:
                    enabled: "{{ var('has_outbreaks', false) }}"
